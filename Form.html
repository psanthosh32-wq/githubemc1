
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <table>
            <tr>
                <th colspan = 2>Student Registraion Form</th>
            </tr> 
            <tr>
                <td>Name</td>
                <td><input type="text" placeholder="Enter your name"></td>
            </tr>
            <tr>
                <td>Register Number</td>
                <td><input type="number"></td>
            </tr>
            <tr>
                <td>College Name</td>
                <td><input type="text" placeholder="Enter College Name"></td>
            </tr>
            <tr>
                <td>Department: </td>
                <td><select>
                    <option>Compter Science and engineering</option>
                    <option>Artificial intelligence and data science></option>
                    <option>Electrical and Electronic commuication</option>
                    <option>Bio medical engineering</option>
                    <option>Robotic and Automation</option>
                    <option>Compter Science and engineering</option>
                    <option>EE (VLSI)</option>
                </select></td>
            </tr>
            <tr>
                <td>CGPA</td>
                <td><input type="number" max="10" placeholder="Upto 2nd semester"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email"></td>
            </tr>
            <tr>
                <td>Gender:</td>
            </tr>
            <tr>
                <td><input type="radio" name="gender"> Male</td>
            </tr>
            <tr><td><input type="radio" name = "gender"> Female</td></tr>
            <tr><td><input type="radio" name="gender">Trans gender</td></tr>
            <tr><td>Id Proofs</td></tr>
            <tr><td><input type="checkbox" name="Id">Aadhar card</td></tr>
            <tr><td><input type="checkbox" name="Id">Pan card</td></tr>
            <tr><td>Confirm</td></tr>

            <tr><td><input type="checkbox" name="Id">I agree the terms and condition</td></tr><br><br>
            <tr><td><input type="submit" ></td></tr><tr><td><input type="reset"></td></tr>


        </table>
    </form>
</body>
</html>
